services:
  # ============================================
  # Inline Firewall (routed datapath)
  # ============================================
  firewall-monitor:
    build: ./firewall
    container_name: firewall-monitor
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      - INFLUXDB_URL=http://172.20.10.200:8086
      - INFLUXDB_TOKEN=scada-token-123
      - INFLUXDB_ORG=scada-lab
      - INFLUXDB_BUCKET=scada-metrics
      - BLOCKER_MODE=enforce
      - FIREWALL_TOPOLOGY=inline
      - MTTD_LOOKBACK=-10m
      - PACKET_CAPTURE_ENABLED=true
      - CAPTURE_INTERFACE=${ZEEK_INTERFACE:-any}
      - PCAP_ROTATION_SECONDS=${PCAP_ROTATION_SECONDS:-15}
    volumes:
      - ./zeek_scripts/blacklist.acl:/tmp/blacklist.acl:ro
      - ./zeek_pcaps:/pcap
    depends_on:
      - influxdb
    networks:
      modbus_src_net:
        ipv4_address: 172.20.10.254
      modbus_dst_net:
        ipv4_address: 172.20.110.254
      dnp3_src_net:
        ipv4_address: 172.20.20.254
      dnp3_dst_net:
        ipv4_address: 172.20.120.254
      iec104_src_net:
        ipv4_address: 172.20.30.254
      iec104_dst_net:
        ipv4_address: 172.20.130.254
      opcua_src_net:
        ipv4_address: 172.20.40.254
      opcua_dst_net:
        ipv4_address: 172.20.140.254
      mgmt_net:
    restart: unless-stopped

  # Zeek processes short rotating pcap files captured by firewall-monitor.
  # This is more reliable than live capture on Docker Desktop.
  zeek-ids:
    image: zeek/zeek:latest
    container_name: zeek-ids
    command: >
      /bin/bash -c 'mkdir -p /opt/zeek/processed;
      mkdir -p /opt/zeek/failed;
      echo "[ZEEK] Offline pcap watcher started";
      while true; do
        for pcap in /opt/zeek/pcap/*.pcap; do
          [ -e "$$pcap" ] || continue;
          size=$$(stat -c%s "$$pcap" 2>/dev/null || echo 0);
          mtime=$$(stat -c%Y "$$pcap" 2>/dev/null || echo 0);
          now=$$(date +%s);
          age=$$((now - mtime));
          if [ "$$size" -gt 24 ] && [ "$$age" -ge 12 ]; then
            echo "[ZEEK] Processing $$pcap";
            [ -e "$$pcap" ] || continue;
            base=$$(basename "$$pcap");
            if zeek -C -r "$$pcap" /opt/zeek/share/zeek/site/custom-scripts/main.zeek; then
              if [ -e "$$pcap" ]; then
                mv "$$pcap" "/opt/zeek/processed/$$base.done";
              else
                echo "[ZEEK] $$pcap already removed after successful processing";
              fi;
            else
              echo "[ZEEK] Failed processing $$pcap";
              if [ -e "$$pcap" ]; then
                mv "$$pcap" "/opt/zeek/failed/$$base.failed";
              else
                echo "[ZEEK] $$pcap already removed after failed processing";
              fi;
            fi;
          fi;
        done;
        sleep 2;
      done'
    volumes:
      - ./zeek_scripts:/opt/zeek/share/zeek/site/custom-scripts
      - ./zeek_logs:/opt/zeek/logs
      - ./zeek_pcaps:/opt/zeek/pcap
    working_dir: /opt/zeek/logs
    depends_on:
      - firewall-monitor
    restart: unless-stopped

  # QoS manager shares firewall-monitor's network namespace, so tc/HTB is
  # applied on the actual inline firewall interfaces.
  qos-router:
    build: ./qos
    container_name: qos-router
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: "service:firewall-monitor"
    environment:
      - INFLUXDB_URL=http://172.20.10.200:8086
      - INFLUXDB_TOKEN=scada-token-123
      - INFLUXDB_ORG=scada-lab
      - INFLUXDB_BUCKET=scada-metrics
      - QOS_MONITOR_INTERVAL=10
      - QOS_TOTAL_RATE=100mbit
      - QOS_P1_PROBE_HOST=172.20.110.10
      - QOS_P1_PROBE_PORT=502
      - QOS_P2_PROBE_HOST=172.20.140.10
      - QOS_P2_PROBE_PORT=4840
    depends_on:
      - firewall-monitor
      - influxdb
    restart: unless-stopped

  ids-monitor:
    build: ./zeek_scripts
    container_name: ids-monitor
    environment:
      - PYTHONUNBUFFERED=1
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=scada-token-123
      - INFLUXDB_ORG=scada-lab
      - INFLUXDB_BUCKET=scada-metrics
      - BLACKLIST_FILE=/app/blacklist.acl
      - WHITELIST_FILE=/app/whitelist.conf
      - NOTICE_LOG=/opt/zeek/logs/notice.log
    volumes:
      - ./zeek_scripts:/app
      - ./zeek_logs:/opt/zeek/logs
    working_dir: /app
    command: python ids_monitor.py
    depends_on:
      - influxdb
      - zeek-ids
    networks:
      mgmt_net:
    restart: unless-stopped

  # ============================================
  # MODBUS inline: client/attacker -> firewall -> server
  # ============================================
  modbus-server:
    build: ./modbus
    container_name: modbus-server
    cap_add:
      - NET_ADMIN
    command: sh -c "ip route replace 172.20.10.0/24 via 172.20.110.254 && python server.py"
    depends_on:
      - influxdb
    networks:
      modbus_dst_net:
        ipv4_address: 172.20.110.10
    stdin_open: true
    tty: true

  modbus-client:
    build: ./modbus
    container_name: modbus-client
    cap_add:
      - NET_ADMIN
    command: sh -c "ip route replace 172.20.110.0/24 via 172.20.10.254 && python client.py"
    restart: on-failure
    depends_on:
      - modbus-server
      - influxdb
    environment:
      - TARGET_HOST=172.20.110.10
    networks:
      modbus_src_net:
        ipv4_address: 172.20.10.20
    stdin_open: true
    tty: true

  modbus-attacker:
    build: ./modbus
    container_name: modbus-attacker
    cap_add:
      - NET_ADMIN
    command: sh -c "ip route replace 172.20.110.0/24 via 172.20.10.254 && python attacker_secure.py"
    restart: on-failure
    depends_on:
      - influxdb
    environment:
      - TARGET_HOST=172.20.110.10
    networks:
      modbus_src_net:
        ipv4_address: 172.20.10.131
    stdin_open: true
    tty: true

  # ============================================
  # IEC104 inline
  # ============================================
  iec104-server:
    build: ./iec104
    container_name: iec104-server
    cap_add:
      - NET_ADMIN
    command: sh -c "ip route replace 172.20.30.0/24 via 172.20.130.254 && python server.py"
    depends_on:
      - influxdb
    networks:
      iec104_dst_net:
        ipv4_address: 172.20.130.10
    stdin_open: true
    tty: true

  iec104-client:
    build: ./iec104
    container_name: iec104-client
    cap_add:
      - NET_ADMIN
    command: sh -c "ip route replace 172.20.130.0/24 via 172.20.30.254 && python client.py"
    restart: on-failure
    depends_on:
      - iec104-server
      - influxdb
    environment:
      - TARGET_HOST=172.20.130.10
    networks:
      iec104_src_net:
        ipv4_address: 172.20.30.20
    stdin_open: true
    tty: true

  iec104-attacker:
    build: ./iec104
    container_name: iec104-attacker
    cap_add:
      - NET_ADMIN
    command: sh -c "ip route replace 172.20.130.0/24 via 172.20.30.254 && python attacker_secure.py"
    restart: on-failure
    depends_on:
      - influxdb
    environment:
      - TARGET_HOST=172.20.130.10
    networks:
      iec104_src_net:
        ipv4_address: 172.20.30.131
    stdin_open: true
    tty: true

  # ============================================
  # DNP3 inline
  # ============================================
  dnp3-server:
    build: ./dnp3
    container_name: dnp3-server
    cap_add:
      - NET_ADMIN
    command: sh -c "ip route replace 172.20.20.0/24 via 172.20.120.254 && python server.py"
    depends_on:
      - influxdb
    networks:
      dnp3_dst_net:
        ipv4_address: 172.20.120.10
    stdin_open: true
    tty: true

  dnp3-client:
    build: ./dnp3
    container_name: dnp3-client
    cap_add:
      - NET_ADMIN
    command: sh -c "ip route replace 172.20.120.0/24 via 172.20.20.254 && python client.py"
    restart: on-failure
    depends_on:
      - dnp3-server
      - influxdb
    environment:
      - TARGET_HOST=172.20.120.10
    networks:
      dnp3_src_net:
        ipv4_address: 172.20.20.20
    stdin_open: true
    tty: true

  dnp3-attacker:
    build: ./dnp3
    container_name: dnp3-attacker
    cap_add:
      - NET_ADMIN
    command: sh -c "ip route replace 172.20.120.0/24 via 172.20.20.254 && python attacker_secure.py"
    restart: on-failure
    depends_on:
      - influxdb
    environment:
      - TARGET_HOST=172.20.120.10
    networks:
      dnp3_src_net:
        ipv4_address: 172.20.20.131
    stdin_open: true
    tty: true

  # ============================================
  # OPC-UA inline
  # ============================================
  opcua-server:
    build: ./opcua
    container_name: opcua-server
    cap_add:
      - NET_ADMIN
    command: sh -c "ip route replace 172.20.40.0/24 via 172.20.140.254 && python server.py"
    depends_on:
      - influxdb
    networks:
      opcua_dst_net:
        ipv4_address: 172.20.140.10
    stdin_open: true
    tty: true

  opcua-client:
    build: ./opcua
    container_name: opcua-client
    cap_add:
      - NET_ADMIN
    command: sh -c "ip route replace 172.20.140.0/24 via 172.20.40.254 && python client.py"
    restart: on-failure
    depends_on:
      - opcua-server
      - influxdb
    environment:
      - TARGET_HOST=172.20.140.10
    networks:
      opcua_src_net:
        ipv4_address: 172.20.40.20
    stdin_open: true
    tty: true

  opcua-attacker:
    build: ./opcua
    container_name: opcua-attacker
    cap_add:
      - NET_ADMIN
    command: sh -c "ip route replace 172.20.140.0/24 via 172.20.40.254 && python attacker_secure.py"
    restart: on-failure
    depends_on:
      - influxdb
    environment:
      - TARGET_HOST=172.20.140.10
    networks:
      opcua_src_net:
        ipv4_address: 172.20.40.131
    stdin_open: true
    tty: true

  # ============================================
  # Monitoring stack
  # ============================================
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_ORG: scada-lab
      DOCKER_INFLUXDB_INIT_BUCKET: scada-metrics
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin1234
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: scada-token-123
    networks:
      modbus_src_net:
        ipv4_address: 172.20.10.200
      modbus_dst_net:
        ipv4_address: 172.20.110.200
      dnp3_src_net:
        ipv4_address: 172.20.20.200
      dnp3_dst_net:
        ipv4_address: 172.20.120.200
      iec104_src_net:
        ipv4_address: 172.20.30.200
      iec104_dst_net:
        ipv4_address: 172.20.130.200
      opcua_src_net:
        ipv4_address: 172.20.40.200
      opcua_dst_net:
        ipv4_address: 172.20.140.200
      mgmt_net:

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb
    networks:
      mgmt_net:

  qos-flooder:
    build:
      context: ./qos
      dockerfile: Dockerfile
    container_name: inline-qos-flooder
    network_mode: "service:firewall-monitor" 
    cap_add:             
      - NET_ADMIN
      - NET_RAW
    profiles: ["qos-demo"]
    command: tail -f /dev/null

networks:
  modbus_src_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.10.0/24
          gateway: 172.20.10.1

  modbus_dst_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.110.0/24
          gateway: 172.20.110.1

  dnp3_src_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.20.0/24
          gateway: 172.20.20.1

  dnp3_dst_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.120.0/24
          gateway: 172.20.120.1

  iec104_src_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.30.0/24
          gateway: 172.20.30.1

  iec104_dst_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.130.0/24
          gateway: 172.20.130.1

  opcua_src_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.40.0/24
          gateway: 172.20.40.1

  opcua_dst_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.140.0/24
          gateway: 172.20.140.1

  mgmt_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

  