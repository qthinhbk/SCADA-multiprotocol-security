services:
  # Zeek IDS - Network traffic analyzer
  zeek-ids:
    image: zeek/zeek:latest
    container_name: zeek-ids
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - ot_net_vlan10
      - ot_net_vlan20
      - ot_net_vlan30
      - ot_net_vlan40
      - mgmt_net
    volumes:
      - ./zeek_scripts:/opt/zeek/share/zeek/site/custom-scripts
      - ./zeek_logs:/opt/zeek/logs
    command: /bin/bash -c "zeek -C -i any local custom-scripts/main.zeek"
    restart: unless-stopped

  # IDS Monitor - Parse Zeek alerts and push to InfluxDB
  ids-monitor:
    image: python:3.11-slim
    container_name: ids-monitor
    environment:
      - PYTHONUNBUFFERED=1
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=scada-token-123
      - INFLUXDB_ORG=scada-lab
      - INFLUXDB_BUCKET=scada-metrics
    volumes:
      - ./zeek_scripts:/app
      - ./zeek_logs:/opt/zeek/logs
    working_dir: /app
    command: /bin/bash -c "pip install influxdb-client && python ids_monitor.py"
    depends_on:
      - influxdb
      - zeek-ids
    networks:
      - mgmt_net
    restart: unless-stopped
  modbus-server:
    build: ./modbus
    container_name: modbus-server
    depends_on:
      - influxdb
    networks:
      ot_net_vlan10:
    stdin_open: true
    tty: true

  modbus-client:
    build: ./modbus
    container_name: modbus-client
    command: python client.py
    restart: on-failure
    depends_on:
      - modbus-server
      - influxdb
    networks:
      ot_net_vlan10:
    stdin_open: true
    tty: true

  modbus-attacker:
    build: ./modbus
    container_name: modbus-attacker
    command: python attacker.py
    restart: on-failure
    depends_on:
      - modbus-server
      - influxdb
    networks:
      ot_net_vlan10:
    stdin_open: true
    tty: true

  iec104-server:
    build: ./iec104
    container_name: iec104-server
    depends_on:
      - influxdb
    networks:
      ot_net_vlan30:
    stdin_open: true
    tty: true

  iec104-client:
    build: ./iec104
    container_name: iec104-client
    command: python client.py
    restart: on-failure
    depends_on:
      - iec104-server
      - influxdb
    networks:
      ot_net_vlan30:
    stdin_open: true
    tty: true

  iec104-attacker:
    build: ./iec104
    container_name: iec104-attacker
    command: python attacker.py
    restart: on-failure
    depends_on:
      - iec104-server
      - influxdb
    networks:
      ot_net_vlan30:
    stdin_open: true  
    tty: true

  dnp3-server:
    build: ./dnp3
    container_name: dnp3-server
    depends_on:
      - influxdb
    networks:
      ot_net_vlan20:
    stdin_open: true
    tty: true

  dnp3-client:
    build: ./dnp3
    container_name: dnp3-client
    command: python client.py
    restart: on-failure
    depends_on:
      - dnp3-server
      - influxdb
    networks:
      ot_net_vlan20:
    stdin_open: true
    tty: true

  dnp3-attacker:
    build: ./dnp3
    container_name: dnp3-attacker
    command: python attacker.py
    restart: on-failure
    depends_on:
      - dnp3-server
      - influxdb
    networks:
      ot_net_vlan20:
    stdin_open: true  
    tty: true

  opcua-server:
    build: ./opcua
    container_name: opcua-server
    depends_on:
      - influxdb
    networks:
      ot_net_vlan40:
    stdin_open: true
    tty: true

  opcua-client:
    build: ./opcua
    container_name: opcua-client
    command: python client.py
    restart: on-failure
    depends_on:
      - opcua-server
      - influxdb
    networks:
      ot_net_vlan40:
    stdin_open: true
    tty: true

  opcua-attacker:
    build: ./opcua
    container_name: opcua-attacker
    command: python attacker.py
    restart: on-failure
    depends_on:
      - opcua-server
      - influxdb
    networks:
      ot_net_vlan40:
    stdin_open: true
    tty: true

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_ORG: scada-lab
      DOCKER_INFLUXDB_INIT_BUCKET: scada-metrics
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin1234
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: scada-token-123
    networks:
      ot_net_vlan10:
      ot_net_vlan20:
      ot_net_vlan30:
      ot_net_vlan40:
      mgmt_net:


  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb
    networks:
      mgmt_net:


networks:
  ot_net_vlan10:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.10.0/24
          ip_range: 172.20.10.128/25
          gateway: 172.20.10.1

  ot_net_vlan20:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.20.0/24
          ip_range: 172.20.20.128/25
          gateway: 172.20.20.1

  ot_net_vlan30:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.30.0/24
          ip_range: 172.20.30.128/25
          gateway: 172.20.30.1

  ot_net_vlan40:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.40.0/24
          ip_range: 172.20.40.128/25
          gateway: 172.20.40.1

  mgmt_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
