services:
  # ============================================
  # Industrial Firewall Service (Phase 2)
  # Monitors ACL enforcement, pushes metrics, and applies iptables blocks
  # ============================================
  firewall-monitor:
    build: ./firewall
    container_name: firewall-monitor
    cap_add:
      - NET_ADMIN
    environment:
      - INFLUXDB_URL=http://172.20.10.200:8086
      - INFLUXDB_TOKEN=scada-token-123
      - INFLUXDB_ORG=scada-lab
      - INFLUXDB_BUCKET=scada-metrics
      - BLOCKER_MODE=enforce
    volumes:
      - ./zeek_scripts/blacklist.acl:/tmp/blacklist.acl:ro
    depends_on:
      - influxdb
    networks:
      ot_net_vlan10:
      ot_net_vlan20:
      ot_net_vlan30:
      ot_net_vlan40:
      quarantine_vlan10:
      quarantine_vlan20:
      quarantine_vlan30:
      quarantine_vlan40:
      mgmt_net:
    privileged: true
    restart: unless-stopped

  # ============================================
  # Zeek IDS + IDS Monitor (Option B: realtime IDS/IPS feedback loop)
  # Zeek reads traffic, ids-monitor parses notice.log and appends blacklist.acl
  # ============================================
  zeek-ids:
    image: zeek/zeek:latest
    container_name: zeek-ids
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - ZEEK_INTERFACE=${ZEEK_INTERFACE:-eth0}
    command: >
      /bin/bash -c 'echo "[ZEEK] Listening on:$${ZEEK_INTERFACE:-eth0}";
      exec zeek -C -p -i "$${ZEEK_INTERFACE:-eth0}" /opt/zeek/share/zeek/site/custom-scripts/main.zeek'
    volumes:
      - ./zeek_scripts:/opt/zeek/share/zeek/site/custom-scripts
      - ./zeek_logs:/opt/zeek/logs
    working_dir: /opt/zeek/logs
    depends_on:
      - influxdb
    networks:
      ot_net_vlan10:
      ot_net_vlan20:
      ot_net_vlan30:
      ot_net_vlan40:
      quarantine_vlan10:
      quarantine_vlan20:
      quarantine_vlan30:
      quarantine_vlan40:
      mgmt_net:
    restart: unless-stopped

  ids-monitor:
    image: python:3.11-slim
    container_name: ids-monitor
    environment:
      - PYTHONUNBUFFERED=1
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=scada-token-123
      - INFLUXDB_ORG=scada-lab
      - INFLUXDB_BUCKET=scada-metrics
      - BLACKLIST_FILE=/app/blacklist.acl
      - NOTICE_LOG=/opt/zeek/logs/notice.log
    volumes:
      - ./zeek_scripts:/app
      - ./zeek_logs:/opt/zeek/logs
    working_dir: /app
    command: /bin/bash -c "pip install influxdb-client && python ids_monitor.py"
    depends_on:
      - influxdb
      - zeek-ids
    networks:
      mgmt_net:
    restart: unless-stopped

  # ============================================
  # QoS Router / Traffic Manager (Week 11)
  # tc + HTB + iptables marking (3 priority levels)
  # Start with: docker compose -f docker-compose.secure.yaml --profile qos up -d
  # ============================================
  qos-router:
    build: ./qos
    container_name: qos-router
    cap_add:
      - NET_ADMIN
      - NET_RAW
    profiles:
      - qos
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=scada-token-123
      - INFLUXDB_ORG=scada-lab
      - INFLUXDB_BUCKET=scada-metrics
      - QOS_MONITOR_INTERVAL=10
      - QOS_TOTAL_RATE=100mbit
    depends_on:
      - influxdb
    networks:
      ot_net_vlan10:
        ipv4_address: 172.20.10.254
      ot_net_vlan20:
        ipv4_address: 172.20.20.254
      ot_net_vlan30:
        ipv4_address: 172.20.30.254
      ot_net_vlan40:
        ipv4_address: 172.20.40.254
      mgmt_net:
        ipv4_address: 172.21.0.254
    restart: unless-stopped

  # ============================================
  # Optional congestion tool (iperf3/hping3)
  # Start with: docker compose -f docker-compose.secure.yaml --profile qos-demo up -d qos-flooder
  # ============================================
  qos-flooder:
    image: debian:12-slim
    container_name: qos-flooder
    cap_add:
      - NET_ADMIN
      - NET_RAW
    profiles:
      - qos-demo
    command: >
      sh -c "export DEBIAN_FRONTEND=noninteractive &&
      apt-get update &&
      apt-get install -y --no-install-recommends iperf3 hping3 procps iproute2 &&
      rm -rf /var/lib/apt/lists/* &&
      ip route replace 172.20.20.0/24 via 172.20.10.254 &&
      ip route replace 172.20.30.0/24 via 172.20.10.254 &&
      ip route replace 172.20.40.0/24 via 172.20.10.254 &&
      echo '[qos-flooder] ready. Use docker exec to run iperf3/hping3 commands.' &&
      tail -f /dev/null"
    networks:
      ot_net_vlan10:
        ipv4_address: 172.20.10.253
      mgmt_net:
    restart: unless-stopped

  # ============================================
  # MODBUS - VLAN 10 (172.20.10.0/24)
  # Server + Client on OT VLAN (whitelisted)
  # Attacker on quarantine (BLOCKED by ACL)
  # ============================================
  modbus-server:
    build: ./modbus
    container_name: modbus-server
    depends_on:
      - influxdb
    networks:
      ot_net_vlan10:
        ipv4_address: 172.20.10.10
    stdin_open: true
    tty: true

  modbus-client:
    build: ./modbus
    container_name: modbus-client
    command: python client.py
    restart: on-failure
    depends_on:
      - modbus-server
      - influxdb
    networks:
      ot_net_vlan10:
        ipv4_address: 172.20.10.20
    stdin_open: true
    tty: true

  modbus-attacker:
    build: ./modbus
    container_name: modbus-attacker
    command: python attacker_secure.py
    restart: on-failure
    depends_on:
      - influxdb
    environment:
      - TARGET_HOST=172.20.10.10
      - INFLUXDB_URL=http://172.20.15.200:8086
    networks:
      quarantine_vlan10:
        ipv4_address: 172.20.15.100
    stdin_open: true
    tty: true

  # ============================================
  # IEC104 - VLAN 30 (172.20.30.0/24)
  # ============================================
  iec104-server:
    build: ./iec104
    container_name: iec104-server
    depends_on:
      - influxdb
    networks:
      ot_net_vlan30:
        ipv4_address: 172.20.30.10
    stdin_open: true
    tty: true

  iec104-client:
    build: ./iec104
    container_name: iec104-client
    command: python client.py
    restart: on-failure
    depends_on:
      - iec104-server
      - influxdb
    networks:
      ot_net_vlan30:
        ipv4_address: 172.20.30.20
    stdin_open: true
    tty: true

  iec104-attacker:
    build: ./iec104
    container_name: iec104-attacker
    command: python attacker_secure.py
    restart: on-failure
    depends_on:
      - influxdb
    environment:
      - TARGET_HOST=172.20.30.10
      - INFLUXDB_URL=http://172.20.35.200:8086
    networks:
      quarantine_vlan30:
        ipv4_address: 172.20.35.100
    stdin_open: true
    tty: true

  # ============================================
  # DNP3 - VLAN 20 (172.20.20.0/24)
  # ============================================
  dnp3-server:
    build: ./dnp3
    container_name: dnp3-server
    depends_on:
      - influxdb
    networks:
      ot_net_vlan20:
        ipv4_address: 172.20.20.10
    stdin_open: true
    tty: true

  dnp3-client:
    build: ./dnp3
    container_name: dnp3-client
    command: python client.py
    restart: on-failure
    depends_on:
      - dnp3-server
      - influxdb
    networks:
      ot_net_vlan20:
        ipv4_address: 172.20.20.20
    stdin_open: true
    tty: true

  dnp3-attacker:
    build: ./dnp3
    container_name: dnp3-attacker
    command: python attacker_secure.py
    restart: on-failure
    depends_on:
      - influxdb
    environment:
      - TARGET_HOST=172.20.20.10
      - INFLUXDB_URL=http://172.20.25.200:8086
    networks:
      quarantine_vlan20:
        ipv4_address: 172.20.25.100
    stdin_open: true
    tty: true

  # ============================================
  # OPC-UA - VLAN 40 (172.20.40.0/24)
  # ============================================
  opcua-server:
    build: ./opcua
    container_name: opcua-server
    depends_on:
      - influxdb
    networks:
      ot_net_vlan40:
        ipv4_address: 172.20.40.10
    stdin_open: true
    tty: true

  opcua-client:
    build: ./opcua
    container_name: opcua-client
    command: python client.py
    restart: on-failure
    depends_on:
      - opcua-server
      - influxdb
    networks:
      ot_net_vlan40:
        ipv4_address: 172.20.40.20
    stdin_open: true
    tty: true

  opcua-attacker:
    build: ./opcua
    container_name: opcua-attacker
    command: python attacker_secure.py
    restart: on-failure
    depends_on:
      - influxdb
    environment:
      - TARGET_HOST=172.20.40.10
      - INFLUXDB_URL=http://172.20.45.200:8086
    networks:
      quarantine_vlan40:
        ipv4_address: 172.20.45.100
    stdin_open: true
    tty: true

  # ============================================
  # Monitoring Stack
  # ============================================
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_ORG: scada-lab
      DOCKER_INFLUXDB_INIT_BUCKET: scada-metrics
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin1234
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: scada-token-123
    networks:
      ot_net_vlan10:
        ipv4_address: 172.20.10.200
      ot_net_vlan20:
        ipv4_address: 172.20.20.200
      ot_net_vlan30:
        ipv4_address: 172.20.30.200
      ot_net_vlan40:
        ipv4_address: 172.20.40.200
      quarantine_vlan10:
        ipv4_address: 172.20.15.200
      quarantine_vlan20:
        ipv4_address: 172.20.25.200
      quarantine_vlan30:
        ipv4_address: 172.20.35.200
      quarantine_vlan40:
        ipv4_address: 172.20.45.200
      mgmt_net:

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb
    networks:
      mgmt_net:

networks:
  # OT VLANs - Server + Client (whitelisted)
  ot_net_vlan10:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.10.0/24
          gateway: 172.20.10.1

  ot_net_vlan20:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.20.0/24
          gateway: 172.20.20.1

  ot_net_vlan30:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.30.0/24
          gateway: 172.20.30.1

  ot_net_vlan40:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.40.0/24
          gateway: 172.20.40.1

  # Quarantine VLANs - Attackers (BLOCKED from OT)
  quarantine_vlan10:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.15.0/24
          gateway: 172.20.15.1

  quarantine_vlan20:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.25.0/24
          gateway: 172.20.25.1

  quarantine_vlan30:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.35.0/24
          gateway: 172.20.35.1

  quarantine_vlan40:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.45.0/24
          gateway: 172.20.45.1

  mgmt_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
